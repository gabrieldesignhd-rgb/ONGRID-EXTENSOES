name: Build and publish Mihon repository

on:
  push:
    branches: [main]
    paths:
      - "sources/**"
      - "repo-entry.json"
      - ".github/workflows/build-and-publish.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-mihon-repo
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout personal repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Validate signing secrets
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$SIGNING_KEY"
          test -n "$ALIAS"
          test -n "$KEY_STORE_PASSWORD"
          test -n "$KEY_PASSWORD"

      - name: Prepare compatible build environment
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/keiyoushi/extensions-source.git builder
          rm -rf builder/src/pt/lycantoons
          cp -R sources/lycantoons builder/src/pt/lycantoons

      - name: Restore private signing key
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          set -euo pipefail
          printf '%s' "$SIGNING_KEY" | base64 --decode > builder/signingkey.jks

      - name: Build Lycan Toons extension
        working-directory: builder
        shell: bash
        env:
          ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew :src:pt:lycantoons:assembleRelease

      - name: Compute signing key fingerprint
        working-directory: builder
        shell: bash
        env:
          ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          FINGERPRINT="$(keytool -list -v -keystore signingkey.jks -alias "$ALIAS" -storepass "$KEY_STORE_PASSWORD" \
            | grep 'SHA256:' \
            | head -n1 \
            | sed 's/.*SHA256: *//' \
            | tr -d ': \r\n' \
            | tr '[:upper:]' '[:lower:]')"
          test -n "$FINGERPRINT"
          echo "SIGNING_KEY_FINGERPRINT=$FINGERPRINT" >> "$GITHUB_ENV"

      - name: Assemble Mihon repository
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p publish/apk publish/icon

          APK_SOURCE="$(find builder/src/pt/lycantoons/build/outputs/apk -type f -name '*.apk' | head -n 1)"
          test -n "$APK_SOURCE"

          APK_NAME="$(python -c "import json; print(json.load(open('repo-entry.json'))['apk'])")"
          cp "$APK_SOURCE" "publish/apk/$APK_NAME"
          cp sources/lycantoons/res/mipmap-xxxhdpi/ic_launcher.png \
            publish/icon/eu.kanade.tachiyomi.extension.pt.lycantoons.png

          python - <<'PY'
          import html
          import json
          import os
          from pathlib import Path

          entry = json.loads(Path("repo-entry.json").read_text(encoding="utf-8"))
          Path("publish/index.min.json").write_text(
              json.dumps([entry], ensure_ascii=False, separators=(",", ":")),
              encoding="utf-8",
          )
          Path("publish/index.json").write_text(
              json.dumps([entry], ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          Path("publish/repo.json").write_text(
              json.dumps(
                  {
                      "meta": {
                          "name": "Gabriel Mihon Extensions",
                          "website": "https://github.com/gabrieldesignhd-rgb/mihon-extensions",
                          "signingKeyFingerprint": os.environ["SIGNING_KEY_FINGERPRINT"],
                      },
                  },
                  ensure_ascii=False,
                  indent=2,
              ),
              encoding="utf-8",
          )

          apk_url = (
              "https://raw.githubusercontent.com/"
              "gabrieldesignhd-rgb/mihon-extensions/repo/apk/"
              + entry["apk"]
          )
          Path("publish/index.html").write_text(
              "<!doctype html><html><head><meta charset='utf-8'>"
              "<title>Gabriel Mihon Extensions</title></head><body>"
              f"<h1>Gabriel Mihon Extensions</h1>"
              f"<p><a href='{html.escape(apk_url)}'>"
              f"{html.escape(entry['name'])}</a></p></body></html>",
              encoding="utf-8",
          )
          PY

          cat > publish/README.md <<'EOF'
          # Gabriel Mihon Extensions

          URL para adicionar no Mihon:

          `https://raw.githubusercontent.com/gabrieldesignhd-rgb/mihon-extensions/repo/index.min.json`
          EOF

      - name: Publish generated branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd publish
          git init
          git checkout -b repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish Mihon repository"
          git remote add origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin repo
